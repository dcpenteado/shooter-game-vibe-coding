<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explodudes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud" class="hidden">
      <div id="hud-bottom-left">
        <div class="hud-bar-group">
          <svg class="hud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.42 4.58a5.4 5.4 0 0 0-7.65 0l-.77.78-.77-.78a5.4 5.4 0 0 0-7.65 7.65l.78.77L12 20.64l7.64-7.64.78-.77a5.4 5.4 0 0 0 0-7.65z"/></svg>
          <div id="hud-health">
            <div id="health-bar"></div>
            <span id="health-text">100</span>
          </div>
        </div>
        <div class="hud-bar-group">
          <svg class="hud-icon fuel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 7v10l8 5 8-5V7z"/><path d="M12 22V12"/><path d="M20 7l-8 5-8-5"/></svg>
          <div id="hud-fuel">
            <div id="fuel-bar"></div>
          </div>
        </div>
      </div>
      <div id="hud-bottom-right">
        <div id="hud-ammo">
          <span id="weapon-name">ASSAULT RIFLE</span>
          <svg class="hud-icon ammo-icon" viewBox="0 0 24 24" fill="none">
            <!-- Left bullet -->
            <rect x="2" y="10" width="4" height="10" rx="0.5" fill="#e8c840"/>
            <polygon points="2,10 3,6.5 4,4.5 5,6.5 6,10" fill="#ee9955"/>
            <!-- Center bullet (taller) -->
            <rect x="9" y="8" width="4" height="12" rx="0.5" fill="#e8c840"/>
            <polygon points="9,8 10,4 11,1.5 12,4 13,8" fill="#ee9955"/>
            <!-- Right bullet -->
            <rect x="16" y="10" width="4" height="10" rx="0.5" fill="#e8c840"/>
            <polygon points="16,10 17,6.5 18,4.5 19,6.5 20,10" fill="#ee9955"/>
          </svg>
          <div id="ammo-numbers">
            <span id="ammo-current">30</span>
            <span id="ammo-divider">/</span>
            <span id="ammo-reserve">120</span>
          </div>
          <div id="hud-mine-info">
            <span id="mine-key">Q</span>
            <svg class="mine-icon" viewBox="0 0 512 512" fill="#ff6644"><path d="M223.688 25.72l21.218 166.78h30.75l21.22-166.78h-73.188zm19.468 184.093v34.25h34.25v-34.25h-34.25zm17.156 79.968c-1.442 0-2.884.04-4.312.064-1.226.02-2.44.057-3.656.094l-1.063.03c-1.3.045-2.587.093-3.874.157-1.203.06-2.403.11-3.594.188-.217.012-.438.017-.656.03-39.48 2.43-74.968 12.954-101.22 25.938-15 7.42-26.97 15.677-34.78 23.25-7.808 7.576-10.78 14.353-10.78 17.314 0 2.96 2.228 7.307 9.686 12.594 7.46 5.286 19.353 10.675 34.407 15.187 30.106 9.025 72.746 14.844 119.843 14.844 47.096 0 89.767-5.82 119.875-14.845 15.053-4.512 26.947-9.9 34.406-15.188 7.46-5.286 9.687-9.633 9.687-12.593 0-2.96-2.972-9.738-10.78-17.313-7.808-7.573-19.78-15.83-34.78-23.25-26.25-12.983-61.764-23.507-101.25-25.936-.22-.015-.437-.017-.658-.03-1.19-.078-2.39-.13-3.593-.19-1.288-.063-2.576-.11-3.876-.155-.136-.006-.27-.028-.406-.033-.23-.007-.458.007-.688 0-1.195-.035-2.388-.074-3.594-.093-1.438-.024-2.89-.063-4.344-.063zm0 18.69c26.39 0 50.255 4.41 66.688 11.03 8.216 3.31 14.52 7.202 18.313 10.813 3.79 3.61 4.906 6.395 4.906 8.78 0 2.386-1.116 5.172-4.908 8.782-1.58 1.506-3.62 3.053-6.03 4.594-4.953-15.806-38.422-28.033-79-28.033-40.555 0-73.986 12.21-78.97 28-2.396-1.533-4.426-3.064-6-4.562-3.79-3.61-4.906-6.396-4.906-8.78 0-2.387 1.115-5.172 4.906-8.783 3.792-3.61 10.097-7.502 18.313-10.812 16.433-6.62 40.297-11.03 66.688-11.03zM77.75 358.25c-22.095 13.71-34.938 30.062-34.938 47.625 0 48.377 97.367 87.594 217.47 87.594 120.1 0 217.468-39.218 217.468-87.595 0-17.54-12.807-33.864-34.844-47.563-.61 10.722-7.856 19.54-17.5 26.375-10.08 7.144-23.57 12.956-39.875 17.844-32.61 9.777-76.607 15.626-125.217 15.626s-92.607-5.85-125.22-15.625c-16.305-4.887-29.764-10.7-39.843-17.842-9.662-6.848-16.915-15.69-17.5-26.438z"/></svg>
            <span id="mine-count">3</span>
          </div>
        </div>
        <div id="reload-bar" class="hidden">
          <div id="reload-bar-fill"></div>
          <span id="reload-text">RELOADING</span>
        </div>
      </div>
      <div id="hud-leaderboard"></div>
      <div id="hud-killfeed"></div>
    </div>
    <div id="lobby">
      <div id="lobby-bg"></div>
      <div id="lobby-overlay"></div>
      <div id="lobby-scanlines"></div>
      <div id="lobby-particles"></div>
      <div id="lobby-vignette"></div>
      <div id="lobby-panel">
        <h1>EXPLODUDES</h1>
        <p id="lobby-subtitle">MULTIPLAYER TACTICAL COMBAT</p>

        <!-- Step 1: Enter name -->
        <div id="step-name">
          <p class="step-label">ENTER YOUR NAME</p>
          <div id="name-input-row">
            <input type="text" id="player-name" placeholder="Your name" maxlength="16">
            <button id="btn-random-name" title="Random name">&#x1f3b2;</button>
          </div>
          <button id="btn-confirm-name" disabled>CONTINUE</button>
        </div>

        <!-- Step 2: Room browser (hidden until name is set) -->
        <div id="step-rooms" class="hidden">
          <div id="player-greeting">
            Playing as <span id="greeting-name"></span>
            <button id="btn-change-name">change</button>
          </div>

          <div id="room-browser">
            <div id="room-list-header">
              <span>ROOMS</span>
              <button id="btn-refresh">&#x21bb;</button>
            </div>
            <div id="room-list"></div>
            <div id="room-create">
              <input type="text" id="room-name" placeholder="Room name" maxlength="24">
              <button id="btn-create-room">+ CREATE</button>
            </div>
          </div>

          <div id="controls-info">
            <p><b>A/D</b> Move &nbsp; <b>W</b> Jump &nbsp; <b>Space</b> Jet Boots</p>
            <p><b>Mouse</b> Aim &nbsp; <b>Click</b> Shoot &nbsp; <b>R</b> Reload &nbsp; <b>Q</b> Mine</p>
          </div>
        </div>

        <p id="lobby-status"></p>
      </div>
    </div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.mjs"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
