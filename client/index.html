<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soldat Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud" class="hidden">
      <div id="hud-health">
        <div id="health-bar"></div>
      </div>
      <div id="hud-ammo"><span id="ammo-current">30</span>/<span id="ammo-reserve">120</span></div>
      <div id="hud-fuel">
        <div id="fuel-bar"></div>
      </div>
      <div id="hud-killfeed"></div>
    </div>
    <div id="lobby">
      <h1>SOLDAT WEB</h1>
      <input type="text" id="player-name" placeholder="Your name" maxlength="16" value="Player">
      <div id="room-browser">
        <div id="room-list-header">
          <span>ROOMS</span>
          <button id="btn-refresh">REFRESH</button>
        </div>
        <div id="room-list"></div>
        <div id="room-create">
          <input type="text" id="room-name" placeholder="Room name" maxlength="24" value="Game Room">
          <button id="btn-create-room">CREATE ROOM</button>
        </div>
      </div>
      <p id="lobby-status"></p>
      <div id="controls-info">
        <p><b>A/D</b> Move &nbsp; <b>W</b> Jump &nbsp; <b>Space</b> Jet Boots</p>
        <p><b>Mouse</b> Aim &nbsp; <b>Click</b> Shoot &nbsp; <b>R</b> Reload</p>
      </div>
    </div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.mjs"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
