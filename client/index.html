<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soldat Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud" class="hidden">
      <div id="hud-bottom-left">
        <div class="hud-bar-group">
          <svg class="hud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.42 4.58a5.4 5.4 0 0 0-7.65 0l-.77.78-.77-.78a5.4 5.4 0 0 0-7.65 7.65l.78.77L12 20.64l7.64-7.64.78-.77a5.4 5.4 0 0 0 0-7.65z"/></svg>
          <div id="hud-health">
            <div id="health-bar"></div>
            <span id="health-text">100</span>
          </div>
        </div>
        <div class="hud-bar-group">
          <svg class="hud-icon fuel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 7v10l8 5 8-5V7z"/><path d="M12 22V12"/><path d="M20 7l-8 5-8-5"/></svg>
          <div id="hud-fuel">
            <div id="fuel-bar"></div>
          </div>
        </div>
      </div>
      <div id="hud-bottom-right">
        <div id="hud-ammo">
          <span id="weapon-name">ASSAULT RIFLE</span>
          <svg class="hud-icon ammo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="4" height="14" rx="1"/><rect x="10" y="3" width="4" height="18" rx="1"/><rect x="17" y="7" width="4" height="10" rx="1"/></svg>
          <div id="ammo-numbers">
            <span id="ammo-current">30</span>
            <span id="ammo-divider">/</span>
            <span id="ammo-reserve">120</span>
          </div>
          <div id="reload-bar" class="hidden">
            <div id="reload-bar-fill"></div>
            <span id="reload-text">RELOADING</span>
          </div>
        </div>
      </div>
      <div id="hud-leaderboard"></div>
      <div id="hud-killfeed"></div>
    </div>
    <div id="lobby">
      <div id="lobby-panel">
        <h1>SOLDAT WEB</h1>

        <!-- Step 1: Enter name -->
        <div id="step-name">
          <p class="step-label">ENTER YOUR NAME</p>
          <div id="name-input-row">
            <input type="text" id="player-name" placeholder="Your name" maxlength="16">
            <button id="btn-random-name" title="Random name">&#x1f3b2;</button>
          </div>
          <button id="btn-confirm-name" disabled>CONTINUE</button>
        </div>

        <!-- Step 2: Room browser (hidden until name is set) -->
        <div id="step-rooms" class="hidden">
          <div id="player-greeting">
            Playing as <span id="greeting-name"></span>
            <button id="btn-change-name">change</button>
          </div>

          <div id="room-browser">
            <div id="room-list-header">
              <span>ROOMS</span>
              <button id="btn-refresh">&#x21bb;</button>
            </div>
            <div id="room-list"></div>
            <div id="room-create">
              <input type="text" id="room-name" placeholder="Room name" maxlength="24">
              <button id="btn-create-room">+ CREATE</button>
            </div>
          </div>

          <div id="controls-info">
            <p><b>A/D</b> Move &nbsp; <b>W</b> Jump &nbsp; <b>Space</b> Jet Boots</p>
            <p><b>Mouse</b> Aim &nbsp; <b>Click</b> Shoot &nbsp; <b>R</b> Reload</p>
          </div>
        </div>

        <p id="lobby-status"></p>
      </div>
    </div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.mjs"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
